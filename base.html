<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFresh Bakery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #fff8f0; }

        .nav-links a:hover { color: #f5c518; }
        .nav-btn { background: #f5c518; color: #1a3a5c !important; padding: 8px 20px; border-radius: 20px; font-weight: bold !important; }
        footer { background: #1a3a5c; color: white; text-align: center; padding: 30px; margin-top: 50px; }
        footer a { color: #f5c518; text-decoration: none; }
